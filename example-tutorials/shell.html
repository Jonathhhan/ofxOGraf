<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ofxOGraf Tutorials</title>
  <style>
    :root {
      color-scheme: dark;
      background: #181818;
    }

    html,
    body {
      margin: 0;
      min-width: 100%;
      min-height: 100%;
      overflow: auto;
      overscroll-behavior: auto;
      background: #181818;
    }

    body {
      padding: 16px;
      box-sizing: border-box;
    }

    #canvas-container {
      width: max-content;
      min-width: 100%;
      min-height: calc(100vh - 32px);
    }

    canvas.emscripten {
      display: block;
      width: 1280px;
      height: 720px;
      max-width: none;
      border: 0;
      background: #181818;
      touch-action: pan-x pan-y pinch-zoom;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 6px 10px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font: 13px/1.4 system-ui, sans-serif;
      pointer-events: none;
    }

    #status:empty {
      display: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas
      class="emscripten"
      id="canvas"
      width="1280"
      height="720"
      tabindex="-1"
      oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">Loading…</div>

  <script>
    const statusElement = document.getElementById('status');
    const canvasElement = document.getElementById('canvas');

    var Module = {
      canvas: canvasElement,
      setStatus(text) {
        statusElement.textContent = text || '';
      },
      monitorRunDependencies(left) {
        this.setStatus(left ? `Loading… (${left})` : '');
      },
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      }
    };

    window.addEventListener('error', (event) => {
      Module.setStatus(`Error: ${event.message}`);
    });
  </script>

  {{{ SCRIPT }}}
</body>
</html>
