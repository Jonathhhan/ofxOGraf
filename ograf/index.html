<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ofxOGraf Essential Graphics preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #101216; }
    main { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1fr) 320px; }
    .stage { display: grid; place-items: center; min-width: 0; padding: 24px; overflow: hidden; }
    of-broadcast-graphic { display: block; width: min(100%, 160vh); aspect-ratio: 16 / 9; background: transparent; box-shadow: 0 18px 70px #0008; }
    of-essential-controls { height: 100vh; overflow: auto; border-left: 1px solid #30343d; }
    .status-shell {
      position: fixed;
      left: 16px;
      bottom: 16px;
      max-width: min(720px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid #30343d;
      border-radius: 10px;
      background: #171a20ee;
      color: #e7ebf3;
      font: 14px/1.4 system-ui, sans-serif;
      box-shadow: 0 10px 30px #0007;
    }
    .status-shell code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      of-essential-controls { height: auto; border: 0; border-top: 1px solid #30343d; }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage"><of-broadcast-graphic id="graphic" code-template="native-lower-third" template-definition="./template-definition.json"></of-broadcast-graphic></section>
    <of-essential-controls for="graphic"></of-essential-controls>
  </main>
  <output id="status" class="status-shell" role="status" aria-live="polite">Loading preview…</output>
  <script type="module">
    import OfBroadcastGraphic from "./OfBroadcastGraphic.js";
    import "./EssentialControls.js";
    customElements.define("of-broadcast-graphic", OfBroadcastGraphic);
    const graphic = document.querySelector("#graphic");
    const status = document.querySelector("#status");

    const loaded = await graphic.load({
      data: { headline: "ofxOGraf", subtitle: "Broadcast graphics", "accent-color": [1, 0.8, 0, 1] },
      renderType: "realtime",
      renderCharacteristics: { resolution: { width: 1920, height: 1080 }, frameRate: 50 }
    });

    if (loaded.statusCode !== 200) {
      status.innerHTML = `
        <strong>Preview failed (${loaded.statusCode})</strong><br>
        ${loaded.statusMessage}<br><br>
        GitHub Pages hosting is configured for static assets, but this preview still requires the generated browser runtime files in <code>ograf/dist/</code>: <code>ofxOGraf.js</code>, <code>ofxOGraf.wasm</code>, and optionally <code>ofxOGraf.data</code>.
      `;
      console.error(status.textContent);
    } else {
      await graphic.goToTime({ timestamp: 1000 });
      status.textContent = "Preview ready";
    }
  </script>
</body>
</html>
