name: Build and deploy OGraf Pages preview

on:
  push:
    branches:
      - copilot/ofxograf-copilot-browser
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      EMSDK: ${{ github.workspace }}\emsdk
      OF_ROOT: ${{ github.workspace }}\openFrameworks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout openFrameworks
        uses: actions/checkout@v4
        with:
          repository: openframeworks/openFrameworks
          path: openFrameworks

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: ${{ env.EMSDK }}
          key: ${{ runner.os }}-emsdk-4.0.12

      - name: Install emsdk
        shell: pwsh
        run: |
          if (!(Test-Path "$env:EMSDK\emsdk.ps1")) {
            git clone https://github.com/emscripten-core/emsdk.git $env:EMSDK
          }
          & "$env:EMSDK\emsdk.ps1" install 4.0.12
          & "$env:EMSDK\emsdk.ps1" activate 4.0.12

      - name: Add emsdk to PATH
        shell: pwsh
        run: |
          "$env:EMSDK" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:EMSDK\upstream\emscripten" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:EMSDK\node\20.18.0_64bit\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install GNU Make
        shell: pwsh
        run: choco install make -y

      - name: Build OGraf Emscripten artifacts
        shell: pwsh
        run: .\scripts\build-ograf.ps1

      - name: Verify Pages payload
        shell: pwsh
        run: |
          $required = @(
            'ograf/index.html',
            'ograf/OfBroadcastGraphic.js',
            'ograf/EssentialControls.js',
            'ograf/dist/ofxOGraf.js',
            'ograf/dist/ofxOGraf.wasm'
          )
          $missing = $required | Where-Object { !(Test-Path $_) }
          if ($missing) {
            throw "Missing Pages payload files: $($missing -join ', ')"
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ograf

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
