name: Build and Deploy to GitHub Pages

# Builds the Emscripten/WebAssembly targets and publishes the browser preview
# plus the tutorial example to GitHub Pages.
#
# Prerequisites (one-time repository setup):
#   Settings → Pages → Source: GitHub Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: JavaScript contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run contract tests
        run: |
          node scripts/validate.mjs
          node tests/feature-contract.mjs
          node tests/controls-contract.mjs
          node tests/authoring-contract.mjs
          node tests/code-template-contract.mjs
          node tests/css-text-overlay-contract.mjs
          node tests/golden-frame-contract.mjs
          node scripts/validate-template-definition.mjs
          node tests/code-template-delivery-contract.mjs
          node tests/package-contract.mjs
          node tests/package-integrity-contract.mjs
          node tests/scene-migration-contract.mjs
          node tests/preflight-contract.mjs
          node tests/structured-controls-contract.mjs
          node --check ograf/OfBroadcastGraphic.js
          node --check ograf/EssentialControls.js
          node --check ograf/TemplateAbi.js
          node --check ograf/CssTextOverlay-v2.js

  build:
    name: Emscripten build
    runs-on: ubuntu-22.04
    env:
      EMSDK_VERSION: '5.0.7'
      OF_ROOT: /opt/openframeworks

    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Resolve openFrameworks nightly asset
        run: |
          ASSET_JSON=$(curl -sf \
            -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/openframeworks/openFrameworks/releases/tags/nightly")
          ASSET_URL=$(echo "$ASSET_JSON" | python3 -c \
            "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if 'linux64_gcc6' in a['name']))")
          OF_DATE=$(echo "$ASSET_URL" | grep -oP '\d{8}')
          echo "OF_ASSET_URL=$ASSET_URL" >> "$GITHUB_ENV"
          echo "OF_DATE=$OF_DATE" >> "$GITHUB_ENV"
          echo "OF_DIRNAME=of_v${OF_DATE}_linux64_gcc6_release" >> "$GITHUB_ENV"

      - name: Cache openFrameworks installation
        uses: actions/cache@v4
        id: of-cache
        with:
          path: ${{ env.OF_ROOT }}
          key: of-nightly-${{ env.OF_DATE }}-emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Download openFrameworks nightly
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ env.OF_ASSET_URL }}" -O /tmp/of.tar.gz
          tar -xzf /tmp/of.tar.gz -C /tmp
          mv "/tmp/${{ env.OF_DIRNAME }}" "${{ env.OF_ROOT }}"

      - name: Patch OF dependency script for runner packages
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          sed -i 's/\<xorgproto\>/x11proto-dev/g' "${{ env.OF_ROOT }}/scripts/linux/debian/install_dependencies.sh"

      - name: Repair Ubuntu package state
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo dpkg --configure -a
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y libunwind-dev

      - name: Install openFrameworks Linux dependencies
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: sudo "${{ env.OF_ROOT }}/scripts/linux/debian/install_dependencies.sh"

      - name: Build openFrameworks Emscripten core
        if: steps.of-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.OF_ROOT }}/libs/openFrameworksCompiled/project
        run: emmake make -j4 PLATFORM_OS=emscripten

      - name: Place addon into OF addons tree
        run: |
          set -euxo pipefail
          DEST="${{ env.OF_ROOT }}/addons/ofxOGraf"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          tar \
            --exclude='./.git' \
            --exclude='./.git/**' \
            -C "${{ github.workspace }}" -cf - . | tar -C "$DEST" -xf -
          test ! -e "$DEST/.git"

      - name: Build example-basic (OGraf Emscripten target)
        working-directory: ${{ env.OF_ROOT }}/addons/ofxOGraf/example-basic
        run: emmake make -j4 APPNAME=ofxOGraf OGRAF_BUILD=1 PLATFORM_OS=emscripten

      - name: Stage tutorial scene data
        run: |
          set -euxo pipefail
          DATA_DIR="${{ env.OF_ROOT }}/addons/ofxOGraf/example-tutorials/bin/data"
          EXAMPLES_DIR="${{ env.OF_ROOT }}/addons/ofxOGraf/examples"

          # Start with a real, clean directory. In particular, do not retain
          # stale symlinks or generated preload entries from a previous build.
          rm -rf "$DATA_DIR"
          mkdir -p "$DATA_DIR"

          install -m 0644 "$EXAMPLES_DIR/ograf-dev-lower-third.scene.json" "$DATA_DIR/ograf-dev-lower-third.scene.json"
          install -m 0644 "$EXAMPLES_DIR/ograf-dev-bug.scene.json" "$DATA_DIR/ograf-dev-bug.scene.json"
          install -m 0644 "$EXAMPLES_DIR/ograf-dev-ticker.scene.json" "$DATA_DIR/ograf-dev-ticker.scene.json"
          install -m 0644 "$EXAMPLES_DIR/ograf-dev-score-bug.scene.json" "$DATA_DIR/ograf-dev-score-bug.scene.json"

          test -f "$DATA_DIR/ograf-dev-lower-third.scene.json"
          test -f "$DATA_DIR/ograf-dev-bug.scene.json"
          test -f "$DATA_DIR/ograf-dev-ticker.scene.json"
          test -f "$DATA_DIR/ograf-dev-score-bug.scene.json"
          test ! -L "$DATA_DIR/ograf-dev-lower-third.scene.json"
          test ! -L "$DATA_DIR/ograf-dev-bug.scene.json"
          test ! -L "$DATA_DIR/ograf-dev-ticker.scene.json"
          test ! -L "$DATA_DIR/ograf-dev-score-bug.scene.json"

      - name: Clean tutorial Emscripten output
        working-directory: ${{ env.OF_ROOT }}/addons/ofxOGraf/example-tutorials
        run: |
          set -euxo pipefail
          rm -rf obj bin/em

      - name: Build example-tutorials (Emscripten target)
        working-directory: ${{ env.OF_ROOT }}/addons/ofxOGraf/example-tutorials
        run: emmake make -j4 APPNAME=example-tutorials PLATFORM_OS=emscripten

      - name: Stage and validate immutable WASM artifacts
        run: |
          set -euxo pipefail
          ARTIFACT_DIR="${{ env.OF_ROOT }}/addons/ofxOGraf/example-basic/bin/em/ofxOGraf"
          DIST_DIR="${{ github.workspace }}/ograf/dist"
          VERSION="${GITHUB_SHA}"
          JS_NAME="ofxOGraf-${VERSION}.js"
          WASM_NAME="ofxOGraf-${VERSION}.wasm"
          DATA_NAME="ofxOGraf-${VERSION}.data"

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"
          cp "$ARTIFACT_DIR/index.js" "$DIST_DIR/$JS_NAME"
          cp "$ARTIFACT_DIR/index.wasm" "$DIST_DIR/$WASM_NAME"
          if [ -f "$ARTIFACT_DIR/index.data" ]; then
            cp "$ARTIFACT_DIR/index.data" "$DIST_DIR/$DATA_NAME"
          fi

          sed -i "s#\"./dist/ofxOGraf.js\"#\"./dist/$JS_NAME\"#" "${{ github.workspace }}/ograf/OfBroadcastGraphic.js"
          sed -i "s#./dist/ofxOGraf.wasm#./dist/$WASM_NAME#g" "${{ github.workspace }}/ograf/OfBroadcastGraphic.js"
          sed -i "s#./dist/ofxOGraf.data#./dist/$DATA_NAME#g" "${{ github.workspace }}/ograf/OfBroadcastGraphic.js"

          test -s "$DIST_DIR/$JS_NAME"
          test -s "$DIST_DIR/$WASM_NAME"
          grep -q "createOfxOGrafModule" "$DIST_DIR/$JS_NAME"
          node --check "$DIST_DIR/$JS_NAME"
          node --check "${{ github.workspace }}/ograf/OfBroadcastGraphic.js"
          xxd -l 4 -p "$DIST_DIR/$WASM_NAME" | grep -q '^0061736d$'
          grep -q "$JS_NAME" "${{ github.workspace }}/ograf/OfBroadcastGraphic.js"
          ls -lh "$DIST_DIR"

      - name: Stage and validate tutorial site
        run: |
          set -euxo pipefail
          SOURCE_DIR="${{ env.OF_ROOT }}/addons/ofxOGraf/example-tutorials/bin/em/example-tutorials"
          TARGET_DIR="${{ github.workspace }}/ograf/tutorials"

          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          cp -a "$SOURCE_DIR"/. "$TARGET_DIR"/

          test -s "$TARGET_DIR/index.html"
          test -s "$TARGET_DIR/index.js"
          test -s "$TARGET_DIR/index.wasm"
          node --check "$TARGET_DIR/index.js"
          xxd -l 4 -p "$TARGET_DIR/index.wasm" | grep -q '^0061736d$'
          if grep -q 'index.data' "$TARGET_DIR/index.js"; then
            test -s "$TARGET_DIR/index.data"
          fi
          ls -lh "$TARGET_DIR"

      - name: Smoke test static payload with emrun
        working-directory: ${{ github.workspace }}/ograf
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_SHA}"
          emrun --no_browser --port 8080 index.html > /tmp/emrun.log 2>&1 &
          EMRUN_PID=$!
          trap 'kill "$EMRUN_PID" 2>/dev/null || true' EXIT

          READY=0
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/ >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            cat /tmp/emrun.log
            exit 1
          fi

          curl -sf http://127.0.0.1:8080/ | grep -q "Loading openFrameworks/WASM"
          curl -sf http://127.0.0.1:8080/OfBroadcastGraphic.js | grep -q "ofxOGraf-${VERSION}.js"
          curl -sfI http://127.0.0.1:8080/template-definition.json
          curl -sfI "http://127.0.0.1:8080/dist/ofxOGraf-${VERSION}.js"
          curl -sfI "http://127.0.0.1:8080/dist/ofxOGraf-${VERSION}.wasm"
          curl -sf http://127.0.0.1:8080/tutorials/ | grep -qi '<canvas\|emscripten\|example-tutorials'
          curl -sfI http://127.0.0.1:8080/tutorials/index.js
          curl -sfI http://127.0.0.1:8080/tutorials/index.wasm
          if [ -f tutorials/index.data ]; then
            curl -sfI http://127.0.0.1:8080/tutorials/index.data
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ograf/

  deploy:
    name: Deploy to GitHub Pages
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
