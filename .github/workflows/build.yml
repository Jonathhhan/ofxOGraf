name: Build and Deploy to GitHub Pages

# Builds the Emscripten/WebAssembly target and publishes the ograf/ web
# component to GitHub Pages so it can run directly in the browser.
#
# Prerequisites (one-time repository setup):
#   Settings → Pages → Source: GitHub Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; do not cancel in-progress deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Fast job: Node.js contract tests — no C++ compilation required.
  # -----------------------------------------------------------------------
  test:
    name: JavaScript contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run contract tests
        run: |
          node scripts/validate.mjs
          node tests/feature-contract.mjs
          node tests/controls-contract.mjs
          node tests/authoring-contract.mjs
          node tests/code-template-contract.mjs
          node tests/css-text-overlay-contract.mjs
          node tests/golden-frame-contract.mjs
          node scripts/validate-template-definition.mjs
          node tests/code-template-delivery-contract.mjs
          node tests/package-contract.mjs
          node tests/package-integrity-contract.mjs
          node tests/scene-migration-contract.mjs
          node tests/preflight-contract.mjs
          node tests/structured-controls-contract.mjs
          node --check ograf/OfBroadcastGraphic.js
          node --check ograf/EssentialControls.js

  # -----------------------------------------------------------------------
  # Emscripten build — produces ofxOGraf.{js,wasm} for the browser.
  # -----------------------------------------------------------------------
  build:
    name: Emscripten build
    runs-on: ubuntu-22.04
    env:
      # emsdk version matching openFrameworks nightly CI.
      EMSDK_VERSION: '5.0.7'
      OF_ROOT: /opt/openframeworks

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Emscripten SDK
      # ------------------------------------------------------------------
      - name: Set up emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      # ------------------------------------------------------------------
      # 2. Resolve the nightly release asset URL and date stamp.
      #    The nightly tarball name changes daily (e.g.
      #    of_v20260716_linux64_gcc6_release.tar.gz), so we query the
      #    GitHub API once to get the exact URL and use the date as the
      #    cache key so the cache busts automatically each new nightly.
      # ------------------------------------------------------------------
      - name: Resolve openFrameworks nightly asset
        run: |
          ASSET_JSON=$(curl -sf \
            -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/openframeworks/openFrameworks/releases/tags/nightly")
          ASSET_URL=$(echo "$ASSET_JSON" | python3 -c \
            "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if 'linux64_gcc6' in a['name']))")
          OF_DATE=$(echo "$ASSET_URL" | grep -oP '\d{8}')
          echo "OF_ASSET_URL=$ASSET_URL"           >> "$GITHUB_ENV"
          echo "OF_DATE=$OF_DATE"                  >> "$GITHUB_ENV"
          echo "OF_DIRNAME=of_v${OF_DATE}_linux64_gcc6_release" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 3. openFrameworks (download + Linux dependencies + Emscripten core)
      #    The entire /opt/openframeworks tree is cached under a key that
      #    includes the nightly date so it busts once per new nightly.
      # ------------------------------------------------------------------
      - name: Cache openFrameworks installation
        uses: actions/cache@v4
        id: of-cache
        with:
          path: ${{ env.OF_ROOT }}
          key: of-nightly-${{ env.OF_DATE }}-emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Download openFrameworks nightly
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ env.OF_ASSET_URL }}" -O /tmp/of.tar.gz
          tar -xzf /tmp/of.tar.gz -C /tmp
          mv "/tmp/${{ env.OF_DIRNAME }}" "${{ env.OF_ROOT }}"

      - name: Patch OF dependency script for runner packages
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          sed -i 's/\<xorgproto\>/x11proto-dev/g' "${{ env.OF_ROOT }}/scripts/linux/debian/install_dependencies.sh"
      - name: Install openFrameworks Linux dependencies
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: sudo "${{ env.OF_ROOT }}/scripts/linux/debian/install_dependencies.sh"

      - name: Build openFrameworks Emscripten core
        if: steps.of-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.OF_ROOT }}/libs/openFrameworksCompiled/project/emscripten
        run: emmake make -j4

      # ------------------------------------------------------------------
      # 4. Place addon and compile example-basic for OGraf (ESM + WASM)
      # ------------------------------------------------------------------
      - name: Place addon into OF addons tree
        run: |
          mkdir -p "${{ env.OF_ROOT }}/addons/ofxOGraf"
          cp -r "${{ github.workspace }}/." "${{ env.OF_ROOT }}/addons/ofxOGraf/"

      - name: Build example-basic (OGraf Emscripten target)
        working-directory: ${{ env.OF_ROOT }}/addons/ofxOGraf/example-basic
        run: emmake make -j4 APPNAME=ofxOGraf OGRAF_BUILD=1 PLATFORM_OS=emscripten

      # ------------------------------------------------------------------
      # 5. Stage WASM artifacts into ograf/dist/ for Pages deployment
      # ------------------------------------------------------------------
      - name: Stage WASM artifacts
        run: |
          ARTIFACT_DIR="${{ env.OF_ROOT }}/addons/ofxOGraf/example-basic/bin/em/ofxOGraf"
          DIST_DIR="${{ github.workspace }}/ograf/dist"
          mkdir -p "$DIST_DIR"
          cp "$ARTIFACT_DIR/index.js"   "$DIST_DIR/ofxOGraf.js"
          cp "$ARTIFACT_DIR/index.wasm" "$DIST_DIR/ofxOGraf.wasm"
          if [ -f "$ARTIFACT_DIR/index.data" ]; then
            cp "$ARTIFACT_DIR/index.data" "$DIST_DIR/ofxOGraf.data"
          fi
          echo "Staged artifacts:"
          ls -lh "$DIST_DIR"

      # ------------------------------------------------------------------
      # 6. Smoke test with emrun
      #    emrun serves the staged ograf/ directory on localhost and
      #    verifies that the WASM, the JS module, and the index page are
      #    all reachable before the artifact is uploaded.
      # ------------------------------------------------------------------
      - name: Smoke test with emrun
        working-directory: ${{ github.workspace }}/ograf
        run: |
          # Start emrun in the background (--no_browser avoids launching a
          # desktop browser; emrun is already on PATH after setup-emsdk).
          emrun --no_browser --port 8080 index.html &
          EMRUN_PID=$!

          # Poll until the server is up (up to 15 seconds).
          for i in $(seq 1 15); do
            sleep 1
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "emrun server is up after ${i}s"
              break
            fi
          done

          # Verify the key files are served without error.
          echo "Checking index.html..."
          curl -sf http://localhost:8080/ | grep -q "of-broadcast-graphic"

          echo "Checking ofxOGraf.js..."
          curl -sf http://localhost:8080/dist/ofxOGraf.js | head -c 128 | grep -q "createOfxOGrafModule"

          echo "Checking ofxOGraf.wasm (binary, check magic bytes)..."
          curl -sf http://localhost:8080/dist/ofxOGraf.wasm --output /tmp/smoke.wasm
          xxd /tmp/smoke.wasm | head -1 | grep -q "0061 736d"

          echo "Smoke test passed."
          kill "$EMRUN_PID" 2>/dev/null || true

      # ------------------------------------------------------------------
      # 7. Upload ograf/ as the GitHub Pages artifact
      # ------------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ograf/

  # -----------------------------------------------------------------------
  # Deploy to GitHub Pages — only on pushes to main (not PRs).
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
